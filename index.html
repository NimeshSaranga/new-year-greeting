<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>සුබ අලුත් අවුරුද්දක් වේවා</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <div id="festivalDecorations" class="hidden">
        <div id="lightString" class="light-string"></div>
        <div class="chakra left-chakra"></div>
        <div class="chakra right-chakra"></div>
    </div>

    <main class="main-wrapper">
        <div class="card-float-wrapper">
            <div class="glass-card" id="mainCard">
                
                <div class="image-wrapper">
                    <img src="OIP.webp" alt="Happy New Year" class="hero-image">
                    <div class="image-glow"></div>
                </div>

                <h1 class="title">සුභ අලුත් අවුරුද්දක් වේවා</h1>
                <h2 class="subtitle">HAPPY NEW YEAR</h2>
                
                <button id="greetBtn" class="magic-button">
                    <span class="btn-text">Enjoy</span>
                    <span class="btn-glow"></span>
                </button>

                <div id="greetingBox" class="greeting-box hidden">
                    <p class="greeting-text">
                        ලැබුවා වු සිංහල අලුත් අවුරුද්ද සාමය සතුට සෞභාග්‍යය සපිරි සුබම සුබ අලුත් අවුරුද්දක් වේවා 🙏
                    </p>
                </div>
            </div>
        </div>
    </main>

<div class="creator-badge">
        <div class="live-dot"></div>
        <div class="badge-text">
            <span class="badge-prefix">Code by</span>
            <span class="badge-name">Nimesh Saranga</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
